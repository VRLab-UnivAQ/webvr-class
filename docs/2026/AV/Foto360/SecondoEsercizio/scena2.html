<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-FRAME 360 scena 2</title>
    <meta name="description" content="360&deg; Image - A-Frame">
    <!-- Libreria A-Frame -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script>
    // Componente custom: al click reindirizza a un'altra pagina
    AFRAME.registerComponent('link-to', {
      schema: { type: 'string', default: '' },
      init: function () {
        this.el.addEventListener('click', () => {
          window.location.href = this.data;
        });
      }
    });
  </script>
  </head>
  <body>
    <a-scene>
      <!-- Ambientazione con immagine 360 -->
      <a-sky src="img/53684574226_e6ca08732b_c.jpg" rotation="0 90 0" color="#ECECEC"></a-sky>

      <!-- Camera + cursor per guardarsi intorno -->
      <a-entity camera look-controls wasd-controls>
        <a-entity 
          cursor="fuse: true; fuseTimeout: 1000"
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          material="color: white; shader: flat">
        </a-entity>
      </a-entity>

      <!-- ═══ PORTALE verso Scena 1 ═══ -->
      <a-entity
        position="0 1.6 -3"
        link-to="scena1.html">

        <!-- Anello visivo del portale -->
        <a-torus
          color="#00CFFF"
          radius="0.8"
          radius-tubular="0.05"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        </a-torus>

        <!-- Superficie interna del portale (piano semitrasparente) -->
        <a-circle
          radius="0.8"
          color="#001F33"
          opacity="0.6"
          side="double">
        </a-circle>

        <!-- Etichetta testuale -->
        <a-text
          value="→ Scena 1"
          alinG="center"
          color="white"
          position="0 -1 0.1"
          width="3">
        </a-text>

    </a-entity>

      <!-- Testo fluttuante -->
      <a-text 
        value="Panoramma 360\nAutore: hapePHOTOGRAPHIX"
        position="0 2 -3"
        aling="center"
        color="#FFFFFF"
        side="double">
      </a-text>
    </a-scene>
  </body>
</html>
