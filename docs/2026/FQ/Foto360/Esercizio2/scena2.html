<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>La mia Esperienza VR 360</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
     <script>
    // Componente custom: al click reindirizza a un'altra pagina
    AFRAME.registerComponent('link-to', {
      schema: { type: 'string', default: '' },
      init: function () {
        this.el.addEventListener('click', () => {
          window.location.href = this.data;
        });
      }
    });
  </script>

  </head>
  <body>
    <a-scene>
      <!-- Cielo con immagine 360 -->
      <a-sky src="img/53692168813_4408bed7b8_c.jpg"></a-sky>

      <!-- Camera + cursor per guardarsi intorno -->
      <a-entity camera look-controls wasd-controls>
        <a-entity 
          cursor="fuse: true; fuseTimeout: 1000"
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          material="color: white; shader: flat">
        </a-entity>
      </a-entity>

      <!-- ═══ PORTALE verso Scena 2 ═══ -->
      <a-entity
        position="0 1.6 -3"
        link-to="scena1.html">

        <!-- Anello visivo del portale -->
        <a-torus
          color="#00CFFF"
          radius="0.8"
          radius-tubular="0.05"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        </a-torus>

        <!-- Superficie interna del portale -->
                <a-circle
          radius="0.8"
          color="#001F33"
          opacity="0.6"
          side="double">
        </a-circle>

        <!-- Etichetta testuale -->
        <a-text
          value="→ HOME"
          align="center"
          color="black"
          position="0 -1 0.1"
          width="3">
        </a-text>

      </a-entity>


    </a-scene>
  </body>
</html>
