<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Il mio Progetto Foto 360</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
     <script>
      // Componente custom: al click reindirizza a un'altra pagina
  AFRAME.registerComponent('link-to', {
    schema: { type: 'string' , default: ''},
    init: function () {
      this.el.addEventListener('click', () => {
        window.location.href = this.data;
      });
    }
  });
</script>
</head>
  <body>
  <a-scene>
    <a-sky src="IMG/scena1.jpg"></a-sky>

    <a-entity camera look-controls wasd-controls>
  <a-entity cursor="fuse: true; fuseTimeout: 1000"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: white; shader: flat"
            raycaster="objects: [link-to]"> 
  </a-entity>
</a-entity>
    <a-entity id="portale-sala2" 
          position="0 0 -3" 
          rotation="0 0 0" 
          link-to="sala2.html">

  <a-torus color="#00cfff" radius="0.8" radius-tubular="0.05"
           animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
  </a-torus>
  
  <a-circle radius="0.75" color="#3d4a5c" opacity="0.6"></a-circle>
   <!-- Superficie interna del portale (piano semitrasparente). altro modo per poterlo fare
      <a-plane
        width="1.4" height="1.4"
        color="#001F33"
        opacity="0.6"
        side="double">
      </a-plane>
 -->
  <a-text value="Entra nella Sala 2" align="center" color="white" position="0 1.1 0" width="4"></a-text>
</a-entity>

  </a-scene> </body>
</html>
