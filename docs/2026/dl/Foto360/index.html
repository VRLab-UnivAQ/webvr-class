<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sky - A-Frame Example</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>      
      <a-assets>
        <img id="skyTexture" src="img/bosco.jpg"> <!-- Immagine panoramica equirettangolare -->
      </a-assets>
      <a-sky src="#skyTexture" radius="500"></a-sky> <!-- Sfondo sferico -->
      <a-camera></a-camera>
      <a-text
        value="(Equirectagular Projection) by Ryan Alexander"
        position="1 0.5 -2"
        align="center"
        color="white"
        font="kelsonsans"
        scale="1 1 1"></a-text>
    </a-scene>
  </body>
</html>
