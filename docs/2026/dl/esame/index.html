<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Zona iniziale</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script>
    // Componente custom: al click reindirizza a un'altra pagina
    AFRAME.registerComponent('link-to', {
      schema: { type: 'string', default: '' },
      init: function () {
        this.el.addEventListener('click', () => {
          window.location.href = this.data;
        });
      }
    });</script>
    <style>
      #audio-ui {
        position: fixed;
        left: 15px;
        bottom: 15px;
        z-index: 10000;
        max-width: 360px;
        padding: 10px 12px;
        border-radius: 10px;
        color: white;
        background: rgba(0, 0, 0, 0.65);
        font-family: Arial, sans-serif;
        font-size: 14px;
        line-height: 1.35;
        box-shadow: 0 0 12px rgba(0,0,0,0.6);
      }

      #stop-audio {
        margin-top: 8px;
        padding: 6px 10px;
        border: 1px solid white;
        border-radius: 6px;
        color: white;
        background: rgba(120, 0, 0, 0.8);
        cursor: pointer;
      }

      #stop-audio:hover {
        background: rgba(180, 0, 0, 0.9);
      }
    </style>
  
    <script>
function aggiornaMessaggioAudio(testo) {
        const msg = document.getElementById("audio-message");
        if (msg) msg.textContent = testo;
      }

      window.audioCorrenteRVA = null;

      function fermaAudioRVA() {
        if (window.audioCorrenteRVA) {
          window.audioCorrenteRVA.pause();
          window.audioCorrenteRVA.currentTime = 0;
          window.audioCorrenteRVA = null;
        }
        aggiornaMessaggioAudio("🎧 Punta un piedistallo per 1 secondo per ascoltare l'audio guida.");
      }

      AFRAME.registerComponent('audio-guida', {
        schema: {
          src: { type: 'string' },
          title: { type: 'string', default: 'Audio guida' }
        },

        init: function () {
          const el = this.el;
          const data = this.data;
          this.audio = new Audio(data.src);
          this.audio.preload = 'auto';
          this.audio.volume = 1.0;

          el.setAttribute('title', data.title);

          el.addEventListener('mouseenter', function () {
            aggiornaMessaggioAudio("🎧 Mantieni il puntatore su: " + data.title + " per ascoltare.");
          });

          el.addEventListener('mouseleave', function () {
            if (!window.audioCorrenteRVA) {
              aggiornaMessaggioAudio("🎧 Punta un piedistallo per 1 secondo per ascoltare l'audio guida.");
            }
          });

          el.addEventListener('click', () => {
            if (window.audioCorrenteRVA && window.audioCorrenteRVA !== this.audio) {
              window.audioCorrenteRVA.pause();
              window.audioCorrenteRVA.currentTime = 0;
            }
            window.audioCorrenteRVA = this.audio;
            this.audio.currentTime = 0;
            this.audio.play().then(() => {
              aggiornaMessaggioAudio("▶ Audio in riproduzione: " + data.title);
            }).catch(() => {
              aggiornaMessaggioAudio("Per avviare l'audio, clicca/tocca il piedistallo una volta.");
            });
          });

          this.audio.addEventListener('ended', function () {
            if (window.audioCorrenteRVA === this) {
              window.audioCorrenteRVA = null;
              aggiornaMessaggioAudio("🎧 Punta un piedistallo per 1 secondo per ascoltare l'audio guida.");
            }
          });
        },

        remove: function () {
          if (this.audio) {
            this.audio.pause();
            this.audio.currentTime = 0;
          }
        }
      });

      document.addEventListener('DOMContentLoaded', function () {
        const room = document.body.dataset.room;
        const dot = document.getElementById('puntino-posizione');
        if (dot && pos) {
          dot.style.left = pos.left;
          dot.style.top = pos.top;
        }
        const stopButton = document.getElementById('stop-audio');
        if (stopButton) {
          stopButton.addEventListener('click', fermaAudioRVA);
        }
      });
    </script>

  </head>
  <body data-room="index">

    <!-- Interfaccia audio guida -->
    <div id="audio-ui">
      <div id="audio-message">🎧 Punta un pannello illustrativo per 1 secondo per ascoltare l'audio guida.</div>
      <button id="stop-audio" type="button">Ferma audio</button>
    </div>

    <a-scene>
      <!-- Sfondo -->
      <a-sky color="Black"></a-sky> 

      <!-- Camera + cursore -->
      <a-entity id="rig" position="0 1 0">
        <a-entity camera look-controls wasd-controls rotation="0 0 0" vertical-movement>
          <a-entity
            cursor="fuse: true; fuseTimeout: 1000"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: brown; shader: flat">
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Display -->
        <a-entity
          gltf-model="modelli/Digital display.glb"
          position="0 0 -4"
          scale="1 1 1"
          rotation="0 0 0"
          class="clickable"
          audio-guida="src: audio/audio introduzione.wav; title: Introduzione">
        </a-entity>

      <!-- PORTALE 1: lineare -->
      <a-entity class="clickable" position="2 0 -4" link-to="scalinata.html">
        <a-torus
          color="#00CFFF"
          radius="0.55"
          radius-tubular="0.035"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        </a-torus>

        <a-plane
          width="1"
          height="1"
          color="#001F33"
          opacity="0.55"
          side="double"
          rotation="0 -0 0">
        </a-plane>

        <a-text
          value="Lineare"
          align="center"
          color="white"
          position="0 -0.75 0.1"
          width="5"
          rotation="0 -0 0">
        </a-text>
      </a-entity>
        
      <!-- PORTALE 2: dalla fine -->
      <a-entity class="clickable" position="-2 0 -4" link="cupola.html">
        <a-torus
          color="#00CFFF"
          radius="0.55"
          radius-tubular="0.035"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        </a-torus>

        <a-plane
          width="1.0"
          height="1.0"
          color="#001F33"
          opacity="0.55"
          side="double"
          rotation="0 -0 0">
        </a-plane>

        <a-text
          value="Dalla cupola"
          align="center"
          color="white"
          position="0 -0.75 0.1"
          width="5"
          rotation="0 -0 0">
        </a-text>
      </a-entity>
      
    </a-scene>
  </body>
</html>
