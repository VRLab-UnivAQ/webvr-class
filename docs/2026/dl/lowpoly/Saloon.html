<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title> Western standoff - pov fenicottero</title>
  <meta name="description" content="Hello World in VR con A-Frame.">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    // Componente custom: al click reindirizza a un'altra pagina
    AFRAME.registerComponent('link-to', {
      schema: { type: 'string', default: '' },
      init: function () {
        this.el.addEventListener('click', () => {
          window.location.href = this.data;
        });
      }
    });</script>
</head>
<body>
  <a-scene light="defaultLightsEnabled: false">

    <a-light type="ambient" color="#442200" intensity="0.4"></a-light>

    <a-light type="point" 
             color="#ff6600" 
             intensity="1.5" 
             distance="10" 
             decay="2" 
             position="-3 1.5 1">
    </a-light>

    <a-light type="point" 
             color="#ffaa44" 
             intensity="0.8" 
             distance="5" 
             position="1 1.2 -1">
    </a-light>
    
    <a-light type="point" 
             color="#ffaa44" 
             intensity="0.8" 
             distance="5" 
             position="4 1.2 2">
    </a-light>

    <a-light type="directional" 
             color="#111133" 
             intensity="0.3" 
             position="1 5 1">
    </a-light>

    <a-entity id="rig" position="-4 0.5 -4.5" rotation="0 -90 0">
            <a-entity camera look-controls wasd-controls>
                <a-entity 
                    cursor="fuse: true; fuseTimeout: 1000"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: white; shader: flat">
                </a-entity>
            </a-entity>
        </a-entity>

    <a-entity
      gltf-model="model/Interno_saloon.glb"
      position="0 0 0"
      scale="1.5 1.5 1.5"
      rotation="0 0 0">
    </a-entity>        

    <!--portale uscita-->
    <a-entity
      position="-6 0.5 -5" 
      link-to="index.html">

      <!-- Superficie interna del portale (piano semitrasparente)-->
      <a-plane
        width="1" height="1"
        color="gray"
        opacity="0.5"
        side="double"
        rotation="0 90 0">
        
      </a-plane>

      <!-- Etichetta testuale -->
      <a-text
        value="→ Uscita"
        align="center"
        color="black"
        position="0.5 1 0"
        width="10"
        rotation="0 90 0"
        side="double">
      </a-text>
    </a-entity>
    <a-sky
      color="black"
      radius="50">
    </a-sky>
    <!--Muro-->
    <a-entity
      gltf-model="model/Wall.glb"
      position="7.4 0 -4.2"
      scale="1.5 2.25 1.5"
      rotation="0 90 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="7.4 0 -1.3"
      scale="1.5 2.25 1.5"
      rotation="0 90 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="6.8 0 1"
      scale="1.5 2.25 1.5"
      rotation="0 90 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="6.8 0 3.9"
      scale="1.5 2.25 1.5"
      rotation="0 90 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="6.8 0 6.8"
      scale="1.5 2.25 1.5"
      rotation="0 90 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="5.8 0 6.5"
      scale="1.5 2.25 1.5"
      rotation="0 0 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="2.9 0 6.5"
      scale="1.5 2.25 1.5"
      rotation="0 0 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="0 0 6.5"
      scale="1.5 2.25 1.5"
      rotation="0 0 0">
    </a-entity>

    <a-entity
      gltf-model="model/Wall.glb"
      position="-2.9 0 6.8"
      scale="1.5 2.25 1.5"
      rotation="0 0 0">
    </a-entity>

    <!--Tetto-->
    <a-entity
      gltf-model="model/Wood_Floor.glb"
      position="0 2.8 0"
      scale="4 4 4"
      rotation="180 0 0">
    </a-entity>

    <!--Porte-->
    <a-entity
      gltf-model="model/Arch_Door.glb"
      position="6.3 -1.3 2.5"
      scale="1 1 1"
      rotation="0 90 0">
    </a-entity>
  </a-scene>
</body>
</html>
