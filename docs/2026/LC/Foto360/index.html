<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame 360° foto</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>

    <a-scene>
        <a-sky src="https://www.istockphoto.com/it/foto/panorama-della-nebulosa-spaziale-a-360-gradi-proiezione-equirettangolare-mappa-gm1363877988-435277415?searchscope=image%2Cfilm" rotation="0 0 0"></a-sky>
        
        <a-entity camera look-controls wasd-controls="acceleration: 30" 
        cursor="rayOrigin: mouse" 
        position="0 0 0" 
        geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" 
        material="color: white; shader: flat">
        
        </a-entity>

    </a-scene>
</body>

</html>
